<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIシンプルチャット</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div class="container">
    <h1>シンプルチャットアプリ</h1>

    <!-- ログインフォーム -->
    <div id="login-container">
      <h2>ログイン</h2>
      <form id="login-form">
        <div class="input-group">
          <label for="username">ユーザー名</label>
          <input type="text" id="username" required>
        </div>
        <div class="input-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit">ログイン</button>
      </form>
      <p><a href="#" id="show-register">新規登録はこちら</a></p>
    </div>

    <!-- 登録フォーム -->
    <div id="register-container" style="display: none;">
      <h2>新規登録</h2>
      <form id="register-form">
        <div class="input-group">
          <label for="reg-username">ユーザー名</label>
          <input type="text" id="reg-username" required>
        </div>
        <div class="input-group">
          <label for="reg-email">メールアドレス</label>
          <input type="email" id="reg-email" required>
        </div>
        <div class="input-group">
          <label for="reg-password">パスワード</label>
          <input type="password" id="reg-password" required>
        </div>
        <button type="submit">登録</button>
      </form>
      <p><a href="#" id="show-login">ログインに戻る</a></p>
    </div>

    <!-- チャットエリア -->
    <div id="chat-container" style="display: none;">
      <div id="user-info">
        <span id="logged-in-user"></span>
        <button id="logout-btn">ログアウト</button>
      </div>
      <div id="chat-content" class="chat-content">
        <div id="messagesArea" class="messages-area"></div>
        <div class="chat-input">
          <input type="text" id="messageInput" placeholder="メッセージを入力..." required>
          <button id="sendButton">送信</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>

</html>
